{# Template pour la carte interactive des interventions #}

<!-- Ressources et performance globale -->
<div class="row mb-4">
    <div class="col-12">
        <div class="card">
            <div class="card-header bg-sofatelcom-primary text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">
                    <i data-feather="map-pin" class="me-2"></i>
                    Carte en temps réel des interventions
                </h5>
                <span id="map-status-badge"></span>
            </div>
            <div class="card-body p-0">
                <div id="map" style="height: 500px; width: 100%;"></div>
            </div>
            <div class="card-footer bg-light">
                <small class="text-muted">
                    <i data-feather="info" style="width: 14px; height: 14px;"></i>
                    Cliquez sur les marqueurs pour voir les détails des interventions
                </small>
            </div>
        </div>
    </div>
</div>
