{% extends "base.html" %}

{% block title %}Page non trouvée - Sofatelcom{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body text-center">
                    <i data-feather="search" class="text-muted mb-3" style="width: 64px; height: 64px;"></i>
                    <h2 class="card-title text-muted">Page non trouvée</h2>
                    <p class="card-text">La page que vous recherchez n'existe pas ou a été déplacée.</p>
                    <a href="{{ url_for('dashboard') }}" class="btn btn-primary">
                        <i data-feather="home" class="me-2"></i>
                        Retour au tableau de bord
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
