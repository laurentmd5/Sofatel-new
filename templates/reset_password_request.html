{% extends "base.html" %}
{% block content %}
<style>
    body {
        background: url('https://sonatel.sn/wp-content/uploads/2024/05/Rapport-annuel-sonatel_visuel-1-scaled.jpg') no-repeat center center fixed;
        background-size: cover;
    }
    .container {
        background: rgba(255, 255, 255, 0.95);
        padding: 2rem;
        border-radius: 1rem;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }
</style>
<div class="container py-5">
    <h3 class="mb-4">Réinitialiser le mot de passe</h3>
    <form method="POST">
        {{ form.hidden_tag() }}
        <div class="mb-3">
            {{ form.email.label(class="form-label") }}
            {{ form.email(class="form-control", placeholder="Votre adresse email") }}
            {% for error in form.email.errors %}
                <div class="text-danger">{{ error }}</div>
            {% endfor %}
        </div>
        <button type="submit" class="btn btn-primary">{{ form.submit.label.text }}</button>
    </form>
</div>
{% endblock %}
