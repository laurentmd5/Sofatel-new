<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Codes-barres - SOFATELCOM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #000;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 10;
        }
        
        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }
        
        .camera-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            position: relative;
            overflow: hidden;
        }
        
        .camera-section.no-camera {
            background: #222;
        }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .no-camera-placeholder {
            color: #999;
            text-align: center;
            padding: 20px;
        }
        
        .scan-guide {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 280px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            box-shadow: inset 0 0 20px rgba(102, 126, 234, 0.3);
            pointer-events: none;
        }
        
        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 3px solid #667eea;
            pointer-events: none;
        }
        
        .corner.top-left {
            top: -3px;
            left: -3px;
            border-right: none;
            border-bottom: none;
        }
        
        .corner.top-right {
            top: -3px;
            right: -3px;
            border-left: none;
            border-bottom: none;
        }
        
        .corner.bottom-left {
            bottom: -3px;
            left: -3px;
            border-right: none;
            border-top: none;
        }
        
        .corner.bottom-right {
            bottom: -3px;
            right: -3px;
            border-left: none;
            border-top: none;
        }
        
        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #667eea, transparent);
            top: 50%;
            left: 0;
            animation: scanLine 2s infinite;
        }
        
        @keyframes scanLine {
            0%, 100% { transform: translateY(-100px); opacity: 0; }
            50% { opacity: 1; }
        }
        
        .scan-hint {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
            font-size: 14px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        .input-section {
            background: white;
            padding: 16px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 8px;
            align-items: stretch;
        }
        
        .input-group {
            flex: 1;
            display: flex;
            gap: 8px;
        }
        
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            background: #f9f9f9;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }
        
        .btn {
            padding: 12px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        
        .btn-scan {
            background: #667eea;
            color: white;
        }
        
        .btn-scan:active {
            background: #5568d3;
            transform: scale(0.95);
        }
        
        .btn-clear {
            background: #f0f0f0;
            color: #666;
        }
        
        .btn-clear:active {
            background: #e0e0e0;
        }
        
        .btn-toggle {
            background: #667eea;
            color: white;
            min-width: 120px;
        }
        
        .results-section {
            background: white;
            border-top: 1px solid #e0e0e0;
            max-height: 40vh;
            overflow-y: auto;
            display: none;
        }
        
        .results-section.show {
            display: block;
        }
        
        .result-card {
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .result-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        
        .result-subtitle {
            font-size: 13px;
            color: #999;
            margin-bottom: 8px;
        }
        
        .result-details {
            font-size: 13px;
            line-height: 1.6;
            color: #666;
        }
        
        .result-details > div {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        
        .result-label {
            font-weight: 500;
            color: #666;
        }
        
        .result-value {
            color: #333;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            margin-top: 8px;
        }
        
        .status-badge.success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .status-badge.warning {
            background: #fff3e0;
            color: #e65100;
        }
        
        .status-badge.danger {
            background: #ffebee;
            color: #c62828;
        }
        
        .status-badge.info {
            background: #e3f2fd;
            color: #1565c0;
        }
        
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-size: 14px;
        }
        
        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-size: 14px;
        }
        
        .info-message {
            background: #e3f2fd;
            color: #1565c0;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-size: 14px;
        }
        
        .scan-type-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .type-btn {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: #666;
        }
        
        .type-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .action-buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        
        .action-buttons .btn {
            flex: 1;
            padding: 10px;
            font-size: 13px;
        }
        
        .btn-reserve {
            background: #2ecc71;
            color: white;
        }
        
        .btn-reserve:active {
            background: #27ae60;
        }
        
        .loading {
            text-align: center;
            padding: 12px;
            color: #667eea;
            font-size: 14px;
        }
        
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #667eea;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .history-link {
            text-align: center;
            padding: 12px;
            border-top: 1px solid #e0e0e0;
            background: #f9f9f9;
        }
        
        .history-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }
        
        .history-link a:active {
            opacity: 0.7;
        }
        
        @media (max-width: 600px) {
            .header h1 {
                font-size: 18px;
            }
            
            .scan-guide {
                width: 240px;
                height: 240px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🔍 Scanner Codes-barres</h1>
        </div>
        
        <!-- Camera Section -->
        <div class="camera-section" id="cameraSection">
            <video id="video" playsinline autoplay></video>
            <div class="scan-guide">
                <div class="corner top-left"></div>
                <div class="corner top-right"></div>
                <div class="corner bottom-left"></div>
                <div class="corner bottom-right"></div>
                <div class="scan-line"></div>
            </div>
            <div class="scan-hint">Pointez le code-barres vers la caméra</div>
        </div>
        
        <!-- Input Section -->
        <div class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="barcodeInput" 
                    placeholder="Code-barres..." 
                    autocomplete="off"
                    autofocus
                />
                <button class="btn btn-scan" onclick="scanFromInput()">Chercher</button>
            </div>
            <button class="btn btn-toggle" id="cameraToggle" onclick="toggleCamera()">🎥 Caméra</button>
        </div>
        
        <!-- Results Section -->
        <div class="results-section" id="resultsSection">
            <!-- Scan type selector -->
            <div style="padding: 12px 16px; border-bottom: 1px solid #e0e0e0;">
                <div class="scan-type-selector">
                    <button class="type-btn active" data-type="product" onclick="setScanType('product')">📦 Produit</button>
                    <button class="type-btn" data-type="intervention" onclick="setScanType('intervention')">🔧 Intervention</button>
                    <button class="type-btn" data-type="nd" onclick="setScanType('nd')">📋 Demande (ND)</button>
                </div>
            </div>
            
            <!-- Results -->
            <div id="resultsContent"></div>
        </div>
    </div>
    
    <!-- Quagga2 barcode detection library -->
    <script src="https://cdn.jsdelivr.net/npm/quagga@2.1.0/dist/quagga.min.js"></script>
    <script>
        // ==============================================
        // BARCODE SCANNER - FRONTEND JS
        // ==============================================
        
        let currentScanType = 'product';
        let cameraActive = false;
        let lastScannedBarcode = '';
        let lastScanTime = 0;
        const SCAN_DEBOUNCE_MS = 1000;  // Prevent duplicate scans within 1 second
        const API_TOKEN = localStorage.getItem('mobile_access_token') || '';
        
        // DOM Elements
        const video = document.getElementById('video');
        const barcodeInput = document.getElementById('barcodeInput');
        const cameraSection = document.getElementById('cameraSection');
        const cameraToggle = document.getElementById('cameraToggle');
        const resultsSection = document.getElementById('resultsSection');
        const resultsContent = document.getElementById('resultsContent');
        
        // Set scan type
        function setScanType(type) {
            currentScanType = type;
            document.querySelectorAll('.type-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.type === type);
            });
        }
        
        // Toggle camera on/off
        function toggleCamera() {
            if (cameraActive) {
                stopCamera();
            } else {
                startCamera();
            }
        }
        
        // Start camera stream and barcode detection
        function startCamera() {
            cameraSection.classList.remove('no-camera');
            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: video,
                    constraints: {
                        width: 640,
                        height: 480,
                        facingMode: "environment"  // Use back camera
                    }
                },
                decoder: {
                    workers: 2,
                    debug: false,
                    readers: [
                        "code_128_reader",
                        "ean_reader",
                        "ean_8_reader",
                        "upc_reader",
                        "upc_e_reader",
                        "codabar_reader"
                    ]
                },
                frequency: 100,
                multiple: false
            }, function(err) {
                if (err) {
                    console.error('[CAMERA] Init failed:', err);
                    showError('❌ Caméra non disponible. Entrez le code-barres manuellement.');
                    cameraSection.classList.add('no-camera');
                    cameraSection.innerHTML = '<div class="no-camera-placeholder">' +
                        '<p>📱 Caméra non disponible</p>' +
                        '<p style="font-size:12px; margin-top:8px; color:#666;">Veuillez entrer le code-barres ci-dessous</p>' +
                        '</div>';
                    return;
                }
                Quagga.start();
                cameraActive = true;
                cameraToggle.textContent = '❌ Fermer';
                barcodeInput.focus();
            });
            
            // Barcode detected
            Quagga.onDetected(function(data) {
                const barcode = data.codeResult.code;
                const now = Date.now();
                
                // Debounce: prevent same barcode twice within 1 second
                if (barcode === lastScannedBarcode && (now - lastScanTime) < SCAN_DEBOUNCE_MS) {
                    return;
                }
                
                lastScannedBarcode = barcode;
                lastScanTime = now;
                
                console.log('[SCANNER] Detected:', barcode);
                barcodeInput.value = barcode;
                performScan(barcode);
            });
        }
        
        // Stop camera
        function stopCamera() {
            try {
                Quagga.stop();
                Quagga.offDetected();
            } catch(e) {}
            cameraActive = false;
            cameraToggle.textContent = '🎥 Caméra';
            
            // Clear video element
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
        }
        
        // Scan from manual input
        function scanFromInput() {
            const barcode = barcodeInput.value.trim();
            if (barcode) {
                performScan(barcode);
            }
        }
        
        // Perform scan (API call)
        async function performScan(barcode) {
            resultsContent.innerHTML = '<div class="loading"><span class="spinner"></span>Recherche...</div>';
            resultsSection.classList.add('show');
            
            try {
                const response = await fetch('/api/barcode/scan', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_TOKEN}`
                    },
                    body: JSON.stringify({
                        barcode: barcode,
                        type: currentScanType,
                        action: 'lookup'
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    displayResult(result);
                    // Logging is automatic on backend (in /api/barcode/scan)
                } else {
                    showError(result.error || 'Code-barres introuvable');
                    // Logging is automatic on backend (in /api/barcode/scan)
                }
            } catch (error) {
                console.error('[SCAN] Error:', error);
                showError('❌ Erreur serveur: ' + error.message);
                // Logging is automatic on backend (in /api/barcode/scan)
            }
        }
        
        // Display scan result
        function displayResult(result) {
            const data = result.data;
            let html = '';
            
            if (result.type === 'product') {
                html = `
                    <div class="result-card">
                        <div class="result-title">📦 ${escapeHtml(data.nom)}</div>
                        <div class="result-subtitle">Code: ${escapeHtml(data.code_produit)}</div>
                        <div class="result-details">
                            <div>
                                <span class="result-label">Stock:</span>
                                <span class="result-value">${data.quantite_stock} unités</span>
                            </div>
                            <div>
                                <span class="result-label">Seuil minimum:</span>
                                <span class="result-value">${data.stock_min}</span>
                            </div>
                            <div>
                                <span class="result-label">Prix unitaire:</span>
                                <span class="result-value">${data.prix_unitaire.toFixed(2)} DA</span>
                            </div>
                        </div>
                        <span class="status-badge ${data.sla_status === 'danger' ? 'danger' : 'success'}">
                            ${data.sla_status === 'danger' ? '⚠️ Stock faible' : '✓ Stock OK'}
                        </span>
                        <div class="action-buttons">
                            <button class="btn btn-reserve" onclick="reserveProduct(${data.id}, '${escapeAttr(data.nom)}')">
                                ➕ Réserver
                            </button>
                            <button class="btn btn-clear" onclick="clearResults()">Fermer</button>
                        </div>
                    </div>
                `;
            }
            else if (result.type === 'intervention') {
                const demande = data.demande || {};
                html = `
                    <div class="result-card">
                        <div class="result-title">🔧 Intervention #${data.intervention_id}</div>
                        <div class="result-subtitle">Statut: ${escapeHtml(data.statut)}</div>
                        <div class="result-details">
                            <div>
                                <span class="result-label">Demande:</span>
                                <span class="result-value">${escapeHtml(demande.nd || 'N/A')}</span>
                            </div>
                            <div>
                                <span class="result-label">Client:</span>
                                <span class="result-value">${escapeHtml(demande.nom_client || 'N/A')}</span>
                            </div>
                            <div>
                                <span class="result-label">Zone:</span>
                                <span class="result-value">${escapeHtml(demande.zone || 'N/A')}</span>
                            </div>
                            <div>
                                <span class="result-label">Type techno:</span>
                                <span class="result-value">${escapeHtml(demande.type_techno || 'N/A')}</span>
                            </div>
                        </div>
                        <div class="action-buttons">
                            <button class="btn btn-clear" onclick="clearResults()">Fermer</button>
                        </div>
                    </div>
                `;
            }
            else if (result.type === 'nd') {
                const statuses = {
                    'en_attente': '⏳ En attente',
                    'en_cours': '🔄 En cours',
                    'termine': '✓ Terminée',
                    'non_assignee': '📋 Non assignée'
                };
                html = `
                    <div class="result-card">
                        <div class="result-title">📋 Demande ${escapeHtml(data.nd)}</div>
                        <div class="result-subtitle">${escapeHtml(data.nom_client)}</div>
                        <div class="result-details">
                            <div>
                                <span class="result-label">Zone:</span>
                                <span class="result-value">${escapeHtml(data.zone)}</span>
                            </div>
                            <div>
                                <span class="result-label">Priorité:</span>
                                <span class="result-value">${escapeHtml(data.priorite_traitement)}</span>
                            </div>
                            <div>
                                <span class="result-label">Statut demande:</span>
                                <span class="result-value">${escapeHtml(data.statut)}</span>
                            </div>
                            <div>
                                <span class="result-label">Intervention:</span>
                                <span class="result-value">${statuses[data.intervention_statut] || data.intervention_statut}</span>
                            </div>
                        </div>
                        <div class="action-buttons">
                            <button class="btn btn-clear" onclick="clearResults()">Fermer</button>
                        </div>
                    </div>
                `;
            }
            
            resultsContent.innerHTML = html;
        }
        
        // Reserve product
        async function reserveProduct(productId, productName) {
            resultsContent.innerHTML = '<div class="loading"><span class="spinner"></span>Réservation...</div>';
            
            try {
                const response = await fetch('/api/barcode/scan', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_TOKEN}`
                    },
                    body: JSON.stringify({
                        barcode: productId.toString(),
                        type: 'product',
                        action: 'reserve'
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showSuccess(`✓ ${productName} réservé(e) avec succès!`);
                    setTimeout(() => clearResults(), 2000);
                } else {
                    showError(result.error || 'Erreur de réservation');
                }
            } catch (error) {
                showError('Erreur: ' + error.message);
            }
        }
        
        // Show error
        function showError(msg) {
            resultsContent.innerHTML = `<div class="error-message">❌ ${escapeHtml(msg)}</div>`;
            resultsSection.classList.add('show');
        }
        
        // Show success
        function showSuccess(msg) {
            resultsContent.innerHTML = `<div class="success-message">${escapeHtml(msg)}</div>`;
            resultsSection.classList.add('show');
        }
        
        // Clear results
        function clearResults() {
            resultsSection.classList.remove('show');
            resultsContent.innerHTML = '';
            barcodeInput.value = '';
            barcodeInput.focus();
        }
        
        // HTML escape utilities
        function escapeHtml(text) {
            if (!text) return '';
            const map = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'};
            return text.replace(/[&<>"']/g, m => map[m]);
        }
        
        function escapeAttr(text) {
            return escapeHtml(text).replace(/"/g, '&quot;');
        }
        
        // Input enter key listener
        barcodeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                scanFromInput();
            }
        });
        
        // Initialize on page load
        window.addEventListener('load', () => {
            // Auto-start camera if available
            setTimeout(startCamera, 500);
        });
        
        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (cameraActive) {
                stopCamera();
            }
        });
    </script>
</body>
</html>
